<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IteraLab — Student Application</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1e3a2f;
  --green2:#253d30;
  --gold:#c1aa8c;
  --cream:#f4efe6;
  --sand:#ddd5c4;
  --white:#fff;
  --text:#1a1a1a;
  --muted:#555;
  --fh:'Bebas Neue',sans-serif;
  --fb:'Inter',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--white);color:var(--text);overflow-x:hidden}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%;height:auto}

/* NAV */
nav{
  position:sticky;top:0;z-index:100;
  background:var(--white);border-bottom:1px solid rgba(0,0,0,.07);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 5%;height:90px;
}
.logo{display:flex;align-items:center}
.logo-img{
  height:72px !important;
  width:auto !important;
  max-height:72px !important;
  max-width:220px !important;
  object-fit:contain !important;
}
.back-home-link{
  font-size:.82rem;
  letter-spacing:.14em;
  text-transform:uppercase;
  font-weight:600;
  color:var(--text);
  transition:color .2s;
}
.back-home-link:hover{color:var(--gold)}

/* APPLICATION PAGE */
.application-page{
  background:var(--white);
  padding:5rem 5% 4rem;
}
.application-wrap{
  max-width:1080px;
  margin:0 auto;
}
.lbl{
  font-size:.66rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--gold);
  font-weight:600;
  margin-bottom:.85rem;
}
h1{
  font-family:var(--fh);
  font-size:clamp(3rem,5vw,5.4rem);
  line-height:.92;
  text-transform:uppercase;
  color:var(--green);
  margin-bottom:1rem;
}
h1 em{font-style:normal;color:var(--gold)}
.intro{
  font-family:var(--fb);
  font-size:1.1rem;
  line-height:1.65;
  color:var(--muted);
  max-width:760px;
  margin-bottom:2.2rem;
}
.iframe-wrap{
  width:100%;
  background:var(--cream);
  border:1px solid var(--sand);
  padding:0;
  overflow:hidden;
}
.form-frame{
  width:100%;
  min-height:1050px;
  border:0;
  background:var(--cream);
}
.btn{
  display:inline-block;
  font-family:var(--fh);
  font-size:.9rem;
  font-weight:700;
  letter-spacing:.16em;
  text-transform:uppercase;
  padding:.9rem 2rem;
  border:2px solid;
  transition:background .2s,color .2s;
  cursor:pointer;
}
.btn-gold{background:var(--gold);color:var(--white);border-color:var(--gold)}
.btn-gold:hover{background:transparent;color:var(--gold)}
.bottom-actions{margin-top:1.5rem}

footer{
  background:var(--cream);
  display:flex;align-items:center;justify-content:center;
  padding:1.4rem 5%;
  font-size:.72rem;
  color:var(--muted);
}

@media(max-width:860px){
  nav{height:auto;padding:.75rem 5%;gap:.75rem;flex-wrap:wrap}
  .logo-img{height:56px !important;max-height:56px !important}
  .back-home-link{font-size:.72rem}
  .application-page{padding:3rem 5%}
  .form-frame{min-height:1100px}
}
</style>
</head>
